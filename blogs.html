<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBlog</title>
    <style>
        :root {
            --glow-color: #00ff41;
            --danger-red: #ff3131;
            --terminal-bg: #050505;
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
        }

        /* Scanline / CRT Effect */
        body::before {
            content: " ";
            display: block;
            position: fixed;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        h1 {
            border-bottom: 2px solid var(--glow-color);
            padding-bottom: 10px;
            text-align: center;
        }

        .btn-system {
            background: transparent;
            color: var(--glow-color);
            border: 1px solid var(--glow-color);
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            text-decoration: none;
            display: inline-block;
            margin-bottom: 20px;
        }

        .btn-system:hover {
            background: var(--glow-color);
            color: black;
        }

        #blogs-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .blog-post {
            border: 1px solid var(--glow-color);
            padding: 20px;
            margin-bottom: 25px;
            width: 100%;
            background: rgba(0, 255, 65, 0.05);
            box-shadow: inset 0 0 10px #00ff4111;
        }
        
        .blog-post h3 {
            margin-top: 0;
            border-bottom: 1px dashed var(--glow-color);
            padding-bottom: 10px;
            font-size: 24px;
        }
        
        .like-btn {
            background: transparent;
            color: var(--danger-red);
            border: 1px solid var(--danger-red);
            cursor: pointer;
            padding: 8px 15px;
            font-family: 'Courier New', monospace;
            float: right;
            font-size: 16px;
            transition: all 0.2s;
        }

        .like-btn:hover {
            background: var(--danger-red);
            color: white;
            box-shadow: 0 0 10px var(--danger-red);
        }

        .blog-content {
            white-space: pre-wrap;
            font-size: 16px;
            line-height: 1.5;
            margin-bottom: 20px;
        }

        .blog-meta {
            color: var(--danger-red);
            font-size: 14px;
            border-top: 1px dotted var(--danger-red);
            padding-top: 10px;
        }

        .auth-warning {
            color: var(--danger-red);
            text-align: center;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <a href="/" class="btn-system">&lt;&lt; BACK TO TERMINAL</a>
    
    <h1>BUNKER ARCHIVES</h1>
    <p id="auth-warning" class="auth-warning">WARNING: UNAUTHENTICATED. LIKES DISABLED.</p>

    <div id="blogs-container">
        <!-- Blogs will be injected here -->
        LOADING ARCHIVED TRANSMISSIONS...
    </div>

    <script>
        const API_URL = "http://127.0.0.1:5000";
        const currentUserId = localStorage.getItem("user_id");

        if (!currentUserId) {
            document.getElementById("auth-warning").style.display = "block";
        }

        async function loadArchives() {
            const container = document.getElementById("blogs-container");
            try {
                const res = await fetch(`${API_URL}/blogs`);
                const blogs = await res.json();
                
                container.innerHTML = "";
                if (blogs.length === 0) {
                    container.innerHTML = "<p>NO ARCHIVES FOUND IN DATABASE.</p>";
                    return;
                }

                blogs.forEach(blog => {
                    const div = document.createElement("div");
                    div.className = "blog-post";
                    
                    const likeDisabled = !currentUserId;
                    const likeAction = likeDisabled ? "alert('MUST BE AUTHENTICATED TO LIKE.')" : `likeBlog(${blog.id})`;
                    
                    div.innerHTML = `
                        <button class="like-btn" onclick="${likeAction}">👍 ${blog.likes}</button>
                        <h3>${blog.title}</h3>
                        <div class="blog-content">${blog.para}</div>
                        <div class="blog-meta">AUTHOR: ${blog.author} | TRANSMISSION ID: ${blog.id}</div>
                    `;
                    container.appendChild(div);
                });

            } catch (e) {
                container.innerHTML = "<p style='color:var(--danger-red)'>SIGNAL LOST. UNABLE TO LOAD ARCHIVES FROM SERVER.</p>";
            }
        }

        async function likeBlog(blogId) {
            if (!currentUserId) return;
            try {
                const res = await fetch(`${API_URL}/blogs/${blogId}/like`, {
                    method: 'POST',
                    headers: {
                        'Authorization': currentUserId
                    }
                });
                if (res.ok) {
                    loadArchives(); // Reload to update the lists specifically sorting by likes
                } else {
                    alert("COMMUNICATION ERROR.");
                }
            } catch (e) {
                alert("NETWORK DISCONNECTED.");
            }
        }

        // Initialize display
        loadArchives();
    </script>
</body>
</html>
