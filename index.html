<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DBlog</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <style>
        :root {
            --glow-color: #00ff41;
            --danger-red: #ff3131;
            --terminal-bg: #050505;
        }

        body {
            background-color: var(--terminal-bg);
            color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            overflow: hidden;
            /* Prevents scrollbars from breaking the 'Dumb' UI */
        }

        /* Scanline / CRT Effect */
        body::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 1000;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }
        
        @keyframes flicker {
            0% { opacity: 0.95; }
            5% { opacity: 0.85; }
            10% { opacity: 0.95; }
            15% { opacity: 1; }
            50% { opacity: 0.98; }
            55% { opacity: 0.95; }
            60% { opacity: 1; }
            90% { opacity: 1; }
            95% { opacity: 0.90; }
            100% { opacity: 1; }
        }

        #ui-header {
            border-bottom: 1px dotted var(--glow-color);
            padding-bottom: 10px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
        }

        /* The 60s Countdown Timer [cite: 62] */
        #decay-meter {
            color: var(--danger-red);
            font-weight: bold;
            text-shadow: 0 0 10px var(--danger-red);
        }

        /* Journal Input Area */
        #journal-textarea, #journal-title {
            width: 100%;
            background: transparent;
            color: var(--glow-color);
            border: none;
            border-bottom: 1px dotted rgba(0, 255, 65, 0.3);
            padding: 5px 0;
            font-size: 14px;
            outline: none;
            box-sizing: border-box;
            border-radius: 0;
            font-family: 'Courier New', monospace;
        }
        
        #journal-title {
            margin-bottom: 10px;
            font-weight: bold;
        }

        #journal-textarea {
            height: 60vh;
            resize: none;
            margin-top: 10px;
        }

        /* The Moving "Still Alive" Button [cite: 58, 59] */
        #still-alive-btn {
            position: absolute;
            background: var(--danger-red);
            color: white;
            border: none;
            padding: 15px 25px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 0 20px var(--danger-red);
            transition: transform 0.1s;
            z-index: 500;
            display: none;
        }

        #still-alive-btn:active {
            transform: scale(0.9);
        }

        /* Action Buttons */
        .controls {
            margin-top: 20px;
            border-top: 1px dotted var(--glow-color);
            padding-top: 10px;
        }

        .btn-system {
            background: transparent;
            color: var(--glow-color);
            border: none;
            padding: 5px 15px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            text-transform: uppercase;
            font-weight: bold;
            display: inline-block;
        }

        .btn-system:hover {
            background: var(--glow-color);
            color: var(--terminal-bg);
        }

        .term-input {
            background: transparent;
            color: var(--glow-color);
            border: none;
            border-bottom: 1px dotted var(--glow-color);
            padding: 5px 0;
            margin: 5px 0 15px 0;
            font-family: 'Courier New', Courier, monospace;
            width: 300px;
            outline: none;
        }

        #auth-overlay, #archives-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--terminal-bg);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #home-view, #archives-view, #write-view {
            z-index: 9998;
            display: none;
            align-items: flex-start;
            padding: 60px 20px 20px 20px;
            box-sizing: border-box;
            overflow-y: auto;
            overflow-x: hidden;
            width: 100%;
            height: 100vh;
            flex-direction: column;
        }

        /* Stark terminal box aesthetic */
        .blog-post {
            padding: 0 0 20px 0;
            margin-bottom: 30px;
            width: 100%;
            border-bottom: 1px dotted rgba(0, 255, 65, 0.2);
            background: transparent;
            box-sizing: border-box;
            position: relative;
            animation: flicker 4s infinite;
        }

        /* Degraded Webcam Feed [User Request] */
        #video-container {
            position: relative;
            overflow: hidden;
        }

        #video-container::before {
            content: " ";
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 10001;
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
        }

        #videoElement {
            filter: grayscale(100%) contrast(150%) brightness(0.9) sepia(60%) hue-rotate(80deg);
            opacity: 0.8;
            mix-blend-mode: screen;
            animation: glitch-skew 3s infinite linear alternate-reverse;
        }

        /* Glitch Keyframes */
        @keyframes glitch-skew {
            0% { transform: skew(0deg); }
            10% { transform: skew(-1deg); }
            11% { transform: skew(1deg) translate(-2px, 1px); filter: grayscale(100%) contrast(150%) brightness(0.9) sepia(60%) hue-rotate(80deg) blur(1px); }
            12% { transform: skew(0deg); filter: grayscale(100%) contrast(150%) brightness(0.9) sepia(60%) hue-rotate(80deg); }
            49% { transform: skew(0deg); }
            50% { transform: skew(2deg) translate(2px, -1px); filter: grayscale(100%) contrast(150%) brightness(2.0) sepia(60%) hue-rotate(80deg); }
            51% { transform: skew(0deg); filter: grayscale(100%) contrast(150%) brightness(0.9) sepia(60%) hue-rotate(80deg); }
            100% { transform: skew(0deg); }
        }
        
        /* Command line header style */
        .blog-post h3 {
            margin: 0 0 10px 0;
            padding-bottom: 8px;
            text-transform: uppercase;
            font-size: 18px;
            border-bottom: 1px solid var(--glow-color);
        }

        .blog-post h3::before {
            content: "root@bunker:~$ ";
            opacity: 0.7;
            font-weight: normal;
        }
        
        .like-btn {
            background: transparent;
            color: var(--danger-red);
            border: none;
            cursor: pointer;
            padding: 2px 5px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            text-transform: uppercase;
            display: inline-block;
        }
        .like-btn:hover {
            background: var(--danger-red);
            color: var(--terminal-bg);
            font-weight: bold;
        }
        
        .blog-meta {
            margin-top: 10px;
            padding-top: 5px;
            display: flex;
            justify-content: flex-start;
            align-items: center;
            gap: 20px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--terminal-bg);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--glow-color);
        }
    </style>
</head>

<body>

<body>

    <div id="auth-overlay">
        <h1>SYSTEM IDENTIFICATION REQUIRED</h1>
        <div id="login-form" style="display:flex; flex-direction:column; align-items:center;">
            <input type="email" id="auth-email" placeholder="> EMAIL" class="term-input" />
            <br>
            <input type="password" id="auth-password" placeholder="> PASSWORD" class="term-input" />
            <br>
            <button class="btn-system" onclick="startFaceScan('login')" style="width: 300px; margin: 5px;">[SCAN_FACE_DATA]</button>
            <input type="hidden" id="login-face" value="" />
            <span id="login-face-status" style="font-size: 12px; margin-bottom: 5px;">FACE NOT SCANNED</span>
            <div>
                <button class="btn-system" onclick="login()">[AUTHENTICATE]</button>
                <button class="btn-system" onclick="showSignup()">[NEW_SURVIVOR]</button>
            </div>
        </div>
        <div id="signup-form" style="display:none; flex-direction:column; align-items:center;">
            <input type="text" id="reg-name" placeholder="> NAME" class="term-input" />
            <input type="number" id="reg-age" placeholder="> AGE" class="term-input" />
            <input type="email" id="reg-email" placeholder="> EMAIL" class="term-input" />
            <input type="password" id="reg-password" placeholder="> PASSWORD" class="term-input" />
            <button class="btn-system" onclick="startFaceScan('register')" style="width: 300px; margin: 5px;">[SCAN_FACE_DATA]</button>
            <input type="hidden" id="reg-face" value="" />
            <span id="face-status" style="font-size: 12px; margin-bottom: 5px;">FACE NOT SCANNED</span>
            <br>
            <div>
                <button class="btn-system" onclick="register()">[REGISTER_NODE]</button>
                <button class="btn-system" onclick="showLogin()">[< CANCEL]</button>
            </div>
        </div>
        <div id="auth-error" style="color: var(--danger-red); margin-top: 15px;"></div>
    </div>

    <div id="video-container" style="display:none; flex-direction:column; align-items:center; z-index:10000; position:fixed; top:20%; left:50%; transform:translate(-50%, 0); background:var(--terminal-bg); border:1px solid var(--glow-color); padding: 10px; overflow: hidden;">
        <h3 style="margin-top:0; position:relative; z-index: 10002;">SCANNING BIOMETRICS...</h3>
        <video id="videoElement" autoplay muted style="width: 300px; height: 225px; border: 1px dashed var(--glow-color); position:relative; z-index: 10000;"></video>
        <button class="btn-system" style="margin-top: 10px; position:relative; z-index: 10002;" onclick="cancelFaceScan()">[CANCEL_UPLOAD]</button>
    </div>

    <!-- NAVBAR FOR AUTHENTICATED USERS -->
    <div id="nav-bar" style="display:none; width:100%; padding:10px 20px; background:var(--terminal-bg); border-bottom:1px dotted var(--glow-color); position:fixed; top:0; z-index:9990; box-sizing:border-box;">
        <span style="font-weight: bold;">[OS_NAV_SYS]: </span>
        <button class="btn-system" onclick="showHome()">[HOME_DIR]</button>
        <button class="btn-system" onclick="showEditor()">[APPEND_LOG]</button>
        <button class="btn-system" onclick="viewArchives()">[BIN_ARCHIVE]</button>
        <button class="btn-system" onclick="logout()" style="float:right; color:var(--danger-red);">[TERMINATE_SESSION]</button>
    </div>

    <!-- HOME VIEW (Own Posts) -->
    <div id="home-view">
        <div style="width:100%;">
            <h2 style="text-align:left; border-bottom: 2px solid var(--glow-color); font-weight: bold; margin-bottom: 30px;">
                >_ DISPLAYING: LOCAL_USER_LOGS.DAT
            </h2>
            <div id="my-blogs-container" style="width:100%; display:flex; flex-direction:column;">
                <!-- Blogs injected here -->
            </div>
        </div>
    </div>

    <!-- MAIN EDITOR (Write Post) -->
    <div id="write-view">
        <div style="width: 100%; display: flex; flex-direction: column;">
            <div id="ui-header" style="width: 100%; display: flex; justify-content: space-between; align-items: center;">
                <div style="flex-grow: 1;">[SESSION_ID: <span id="current-user-name"></span>]</div>
                <div id="decay-meter" style="text-align: right;">[SECURE_CHANNEL_TIMEOUT: <span id="timer">60</span>s]</div>
            </div>

            <input type="text" id="journal-title" placeholder="> INPUT_HEADER" />
            <textarea id="journal-textarea" placeholder="> AWAITING_INPUT_STREAM..._"></textarea>

            <div class="controls">
                <button class="btn-system" onclick="saveBlog()">[EXECUTE_COMMIT]</button>
                <button class="btn-system" onclick="purgeLog()">[SIGKILL_DRAFT]</button>
                <button class="btn-system" onclick="restoreBackup()">[RECOVER_MEM_DUMP]</button>
            </div>
        </div>
    </div>

    <!-- ARCHIVES VIEW (Bunker) -->
    <div id="archives-view" style="justify-content: flex-start;">
        <div style="width:100%;">
            <div style="width:100%; margin-bottom: 20px;">
                <button class="btn-system" onclick="showHome()" style="padding-left:0;">[< RETURN_TO_LOCAL]</button>
            </div>
            <h2 style="text-align:left; border-bottom: 2px solid var(--glow-color); font-weight: bold; margin-bottom: 20px;">
                >_ ACCESSING: GLOBAL_ARCHIVES_NODE.DAT
            </h2>
            <div id="blogs-container" style="width:100%; display:flex; flex-direction:column;">
                <!-- Blogs injected here -->
            </div>
        </div>
    </div>

    <!-- SYSTEM MESSAGE NOTIFICATIONS -->
    <div id="sys-message" style="position:fixed; bottom:20px; right:20px; z-index:10000; font-weight:bold; padding:10px; background:var(--terminal-bg); border:1px solid var(--glow-color); display:none; max-width:300px; word-wrap:break-word;"></div>

    <button id="still-alive-btn" onclick="confirmExistence()">STILL ALIVE</button>

    <script>
        const API_URL = "http://127.0.0.1:5000";
        let timer = 60;
        let lastCheckpoint = "";
        let timerInterval;
        let moveInterval;
        let sysMsgTimeout;

        function showMessage(msg, isError = false) {
            const sysBox = document.getElementById("sys-message");
            sysBox.style.display = "block";
            sysBox.innerText = `>> ${msg}`;
            sysBox.style.color = isError ? "var(--danger-red)" : "var(--glow-color)";
            sysBox.style.borderColor = isError ? "var(--danger-red)" : "var(--glow-color)";
            clearTimeout(sysMsgTimeout);
            sysMsgTimeout = setTimeout(() => { sysBox.style.display = "none"; }, 3000);
        }

        const textArea = document.getElementById('journal-textarea');
        const timerDisplay = document.getElementById('timer');
        const aliveBtn = document.getElementById('still-alive-btn');

        // ==== PROCEDURAL AUDIO ENGINE ==== 
        // Generates sound directly in the browser to bypass any download/adblock issues
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        
        function playKeystroke() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Sharp, dry vintage terminal relay "TICK"
            osc.type = 'square';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.02);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.02);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.03);
        }

        function playBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Classic DOS motherboard POST beep
            osc.type = 'square';
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        // Tension-building alarm sound
        function playPanicBeep() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(600, audioCtx.currentTime + 0.2);
            
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.2);
        }

        // Heavy, distorted system failure sound
        function playPowerDown() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc1 = audioCtx.createOscillator();
            const osc2 = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc1.type = 'sawtooth';
            osc2.type = 'square';
            osc1.frequency.setValueAtTime(100, audioCtx.currentTime);
            osc1.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 1.0);
            osc2.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc2.frequency.exponentialRampToValueAtTime(15, audioCtx.currentTime + 1.0);
            
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
            
            osc1.connect(gain);
            osc2.connect(gain);
            gain.connect(audioCtx.destination);
            osc1.start();
            osc2.start();
            osc1.stop(audioCtx.currentTime + 1.0);
            osc2.stop(audioCtx.currentTime + 1.0);
        }

        let humOscillator = null;
        let scanOscillator = null;

        let systemBooted = false;

        // Global Action Beeps & Ambient Hum Booting
        document.body.addEventListener('click', (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            // Start the low ambient CTR hum on first interaction
            if (!systemBooted) {
                humOscillator = audioCtx.createOscillator();
                const humGain = audioCtx.createGain();
                humOscillator.type = 'sine';
                humOscillator.frequency.value = 55; // Deep 60hz-ish ground loop hum
                humGain.gain.value = 0.05; // Very quiet
                humOscillator.connect(humGain);
                humGain.connect(audioCtx.destination);
                humOscillator.start();
                systemBooted = true;
            }

            // Play terminal beep on any button system click
            if (e.target.classList.contains('btn-system') || e.target.classList.contains('like-btn')) {
                playBeep();
            }
        });

        // Authentic Keyboard Audio Feedback
        document.addEventListener('keydown', (e) => {
            if (["Shift", "Control", "Alt", "Meta", "CapsLock"].includes(e.key)) return;
            playKeystroke();
        });

        // Slow terminal "typewriter" effect [cite: 74]
        function typeWriter(elementId, text, speed = 15) {
            const el = document.getElementById(elementId);
            if (!el) return;
            el.innerHTML = "";
            let i = 0;
            
            function type() {
                if (i < text.length) {
                    el.innerHTML += text.charAt(i);
                    playKeystroke(); // Authentic hardware clicking per character
                    i++;
                    setTimeout(type, speed);
                }
            }
            type();
        }

        let faceModelsLoaded = false;
        async function loadFaceModels() {
            if (faceModelsLoaded) return;
            const modelUrl = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
            document.getElementById("auth-error").innerText = "LOADING BIOMETRIC MODELS...";
            await faceapi.nets.tinyFaceDetector.loadFromUri(modelUrl);
            await faceapi.nets.faceLandmark68Net.loadFromUri(modelUrl);
            await faceapi.nets.faceRecognitionNet.loadFromUri(modelUrl);
            faceModelsLoaded = true;
            document.getElementById("auth-error").innerText = "";
        }

        let faceScanMode = null; 
        let videoStream = null;
        let isAnalyzing = false;
        let scanTimeout = null;
        let scanInterval = null;

        async function startFaceScan(mode) {
            faceScanMode = mode;
            await loadFaceModels();
            
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('videoElement');
            videoContainer.style.display = 'flex';
            
            try {
                videoStream = await navigator.mediaDevices.getUserMedia({ video: {} });
                video.srcObject = videoStream;
            } catch (err) {
                document.getElementById("auth-error").innerText = "CAMERA ACCESS DENIED.";
                videoContainer.style.display = 'none';
                return;
            }

            video.addEventListener('play', onVideoPlay);
        }

        function cancelFaceScan() {
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('videoElement');
            if (videoStream) {
                videoStream.getTracks().forEach(track => track.stop());
            }
            videoContainer.style.display = 'none';
            video.removeEventListener('play', onVideoPlay);
            
            if (isAnalyzing) {
                clearTimeout(scanTimeout);
                clearInterval(scanInterval);
                isAnalyzing = false;
                if (scanOscillator) {
                    scanOscillator.stop();
                    scanOscillator = null;
                }
                document.querySelector("#video-container h3").innerText = "SCANNING BIOMETRICS...";
            }
        }

        async function onVideoPlay() {
            const videoContainer = document.getElementById('video-container');
            const video = document.getElementById('videoElement');
            if (videoContainer.style.display === 'none' || video.paused || video.ended || !faceScanMode || isAnalyzing) return;
            
            const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
            
            if (detection) {
                isAnalyzing = true;
                const descriptor = Array.from(detection.descriptor);
                const strData = JSON.stringify(descriptor);
                
                const scanTitle = videoContainer.querySelector("h3");
                const originalTitle = scanTitle.innerText;
                
                // Play data telemetry sound while decoding [cite: 74]
                if (audioCtx.state === 'suspended') audioCtx.resume();
                scanOscillator = audioCtx.createOscillator();
                const scanGain = audioCtx.createGain();
                scanOscillator.type = 'sawtooth';
                scanOscillator.frequency.value = 800;
                scanGain.gain.value = 0.05;
                scanOscillator.connect(scanGain);
                scanGain.connect(audioCtx.destination);
                scanOscillator.start();

                // Modulate the frequency to sound like data scanning
                const modInterval = setInterval(() => {
                    if (scanOscillator) {
                        scanOscillator.frequency.value = 400 + Math.random() * 800;
                    }
                }, 50);

                const texts = [
                    "ANALYZING FACIAL TOPOGRAPHY...",
                    "CHECKING RADIATION SIGNATURE...",
                    "DECRYPTING GENETIC MARKERS...",
                    "MATCHING BUNKER RECORDS...",
                    "VERIFYING SURVIVOR IDENTITY..."
                ];
                
                let step = 0;
                scanInterval = setInterval(() => {
                    scanTitle.innerText = texts[step % texts.length];
                    step++;
                }, 500);
                
                scanTimeout = setTimeout(() => {
                    clearInterval(scanInterval);
                    clearInterval(modInterval);
                    if (scanOscillator) {
                        scanOscillator.stop();
                        scanOscillator = null;
                    }
                    scanTitle.innerText = originalTitle;
                    isAnalyzing = false;
                    
                    cancelFaceScan();
                    
                    if (faceScanMode === 'register') {
                        document.getElementById('reg-face').value = strData;
                        document.getElementById('face-status').innerText = "FACE SCANNED AND ENCODED.";
                        document.getElementById('face-status').style.color = "var(--glow-color)";
                    } else if (faceScanMode === 'login') {
                        document.getElementById('login-face').value = strData;
                        document.getElementById('login-face-status').innerText = "FACE SCANNED AND ENCODED.";
                        document.getElementById('login-face-status').style.color = "var(--glow-color)";
                    }
                    faceScanMode = null;
                }, 2500);
            } else {
                setTimeout(onVideoPlay, 500);
            }
        }

        // Navigation & Auth Logic
        let currentUserId = localStorage.getItem("user_id");
        let currentUserName = localStorage.getItem("user_name");

        function hideAllViews() {
            document.getElementById("auth-overlay").style.display = "none";
            document.getElementById("write-view").style.display = "none";
            document.getElementById("archives-view").style.display = "none";
            document.getElementById("home-view").style.display = "none";
            document.getElementById("nav-bar").style.display = "none";
            stopLogic();
        }

        function checkAuth() {
            if (currentUserId) {
                document.getElementById("current-user-name").innerText = currentUserName;
                showHome();
            } else {
                hideAllViews();
                document.getElementById("auth-overlay").style.display = "flex";
            }
        }

        async function showHome() {
            hideAllViews();
            document.getElementById("nav-bar").style.display = "block";
            document.getElementById("home-view").style.display = "flex";
            
            const container = document.getElementById("my-blogs-container");
            container.innerHTML = "LOADING PERSONAL LOGS...";
            
            try {
                const res = await fetch(`${API_URL}/blogs`);
                const blogs = await res.json();
                
                container.innerHTML = "";
                const myBlogs = blogs.filter(b => String(b.author_id) === String(currentUserId));
                
                if (myBlogs.length === 0) {
                    container.innerHTML = "<p>NO PERSONAL LOGS FOUND.</p>";
                    return;
                }

                myBlogs.forEach(blog => {
                    const uniqueId = `typewriter-p-${blog.id}-${Math.random().toString(36).substr(2, 9)}`;
                    const div = document.createElement("div");
                    div.className = "blog-post";
                    div.innerHTML = `
                        <h3>${blog.title}</h3>
                        <p id="${uniqueId}" style="white-space: pre-wrap; font-size: 14px; margin-bottom: 10px;">_</p>
                        <div class="blog-meta">
                            <span style="color:var(--glow-color)">STATUS: DELIVERED</span>
                            <button class="like-btn" onclick="likeBlog(${blog.id}, true)">[ACK: ${blog.likes}]</button>
                        </div>
                    `;
                    container.appendChild(div);
                    // Trigger the typing effect immediately after attaching
                    typeWriter(uniqueId, blog.para);
                });
            } catch (e) {
                container.innerHTML = "<p style='color:var(--danger-red)'>SIGNAL LOST.</p>";
            }
        }

        function showEditor() {
            hideAllViews();
            document.getElementById("nav-bar").style.display = "block";
            document.getElementById("write-view").style.display = "flex";
            
            document.getElementById('journal-title').value = '';
            document.getElementById('journal-textarea').value = '';
            lastCheckpoint = "";
            
            startLogic(); // Initiate 60s timer + moving still alive button!
        }

        function showSignup() {
            document.getElementById("login-form").style.display = "none";
            document.getElementById("signup-form").style.display = "flex";
            document.getElementById("auth-error").innerText = "";
        }

        function showLogin() {
            document.getElementById("login-form").style.display = "flex";
            document.getElementById("signup-form").style.display = "none";
            document.getElementById("auth-error").innerText = "";
        }

        async function login() {
            const email = document.getElementById("auth-email").value;
            const password = document.getElementById("auth-password").value;
            const face_data = document.getElementById("login-face").value;
            
            if (!email || !password || !face_data) {
                document.getElementById("auth-error").innerText = "MISSING EMAIL, PASSWORD, OR FACE SCAN.";
                return;
            }
            
            try {
                const res = await fetch(`${API_URL}/signin`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({email, password, face_data})
                });
                const data = await res.json();
                if (res.ok) {
                    currentUserId = data.user_id;
                    currentUserName = data.name;
                    localStorage.setItem("user_id", currentUserId);
                    localStorage.setItem("user_name", currentUserName);
                    checkAuth();
                } else {
                    document.getElementById("auth-error").innerText = data.error;
                }
            } catch (e) {
                document.getElementById("auth-error").innerText = "NETWORK ERROR.";
            }
        }

        async function register() {
            const name = document.getElementById("reg-name").value;
            const age = document.getElementById("reg-age").value;
            const email = document.getElementById("reg-email").value;
            const password = document.getElementById("reg-password").value;
            const face_data = document.getElementById("reg-face").value;

            try {
                const res = await fetch(`${API_URL}/signup`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name, age, email, password, face_data})
                });
                const data = await res.json();
                if (res.ok) {
                    document.getElementById("auth-error").innerText = "REGISTRATION OK. PLEASE LOGIN.";
                    document.getElementById("auth-error").style.color = "var(--glow-color)";
                    showLogin();
                } else {
                    document.getElementById("auth-error").innerText = data.error;
                    document.getElementById("auth-error").style.color = "var(--danger-red)";
                }
            } catch (e) {
                document.getElementById("auth-error").innerText = "NETWORK ERROR.";
                document.getElementById("auth-error").style.color = "var(--danger-red)";
            }
        }

        function logout() {
            localStorage.removeItem("user_id");
            localStorage.removeItem("user_name");
            currentUserId = null;
            currentUserName = null;
            checkAuth();
        }

        // 1. Implementation of the 60s deletion rule [cite: 56, 60]
        function startLogic() {
            timer = 60;
            const decayMeter = document.getElementById('decay-meter');
            decayMeter.style.color = "var(--glow-color)";
            aliveBtn.style.display = "block";
            clearInterval(timerInterval);
            clearInterval(moveInterval);
            
            timerInterval = setInterval(() => {
                timer--;
                timerDisplay.innerText = timer;

                // Panic Mode triggers at 15 seconds
                if (timer <= 15 && timer > 0) {
                    playPanicBeep();
                    // Flash the color between red and green
                    decayMeter.style.color = (timer % 2 === 0) ? "var(--danger-red)" : "var(--glow-color)";
                }

                if (timer <= 0) {
                    playPowerDown();
                    
                    // Backup to local storage before wiping
                    localStorage.setItem("timeout_backup_title", document.getElementById('journal-title').value);
                    localStorage.setItem("timeout_backup_para", textArea.value);

                    // Explode immediately [cite: 63]
                    document.getElementById('journal-title').value = '';
                    textArea.value = "";
                    lastCheckpoint = "";
                    decayMeter.style.color = "var(--danger-red)";
                    showMessage("CRITICAL ERROR: BIOMETRIC TIMEOUT. POST ERASED.", true);
                    timer = 60;
                }
            }, 1000);

            moveInterval = setInterval(moveButton, 3000);
            moveButton();
        }

        function stopLogic() {
            clearInterval(timerInterval);
            clearInterval(moveInterval);
            aliveBtn.style.display = "none";
            document.getElementById('decay-meter').style.color = "var(--glow-color)";
        }

        // 2. Random button movement Logic
        function moveButton() {
            if (document.getElementById("write-view").style.display !== "flex") return;
            const maxX = window.innerWidth - 200;
            const maxY = window.innerHeight - 100;
            // Ensure button doesn't jump onto navbar
            let randomY = Math.floor(Math.random() * maxY);
            if (randomY < 80) randomY = 80; 
            const randomX = Math.floor(Math.random() * maxX);

            aliveBtn.style.left = randomX + 'px';
            aliveBtn.style.top = randomY + 'px';
        }

        // Confirmation logic [cite: 57]
        function confirmExistence() {
            playKeystroke(); // Add physical click sound when resetting timer [User Request]
            lastCheckpoint = textArea.value;
            timer = 60;
            timerDisplay.innerText = timer;
            document.getElementById('decay-meter').style.color = "var(--glow-color)";
            moveButton();
            console.log("State Observed. Timer Reset.");
        }

        function purgeLog() {
            document.getElementById('journal-title').value = '';
            document.getElementById('journal-textarea').value = '';
        }

        function restoreBackup() {
            const bTitle = localStorage.getItem("timeout_backup_title");
            const bPara = localStorage.getItem("timeout_backup_para");
            if (bTitle || bPara) {
                document.getElementById('journal-title').value = bTitle || '';
                document.getElementById('journal-textarea').value = bPara || '';
                showMessage("BACKUP RESTORED SUCCESSFULLY.");
            } else {
                showMessage("NO BACKUP FOUND IN SYSTEM.", true);
            }
        }

        async function saveBlog() {
            const title = document.getElementById('journal-title').value;
            const para = document.getElementById('journal-textarea').value;
            if (!title || !para) {
                showMessage("TRANSMISSION FAILED. MISSING DATA.", true);
                return;
            }
            try {
                const res = await fetch(`${API_URL}/blogs`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': currentUserId
                    },
                    body: JSON.stringify({title, para, image: ""})
                });
                if (res.ok) {
                    showMessage("ARCHIVE SUCCESSFUL.");
                    document.getElementById('journal-title').value = '';
                    document.getElementById('journal-textarea').value = '';
                    lastCheckpoint = '';
                } else {
                    showMessage("ARCHIVE FAILED: CORRUPTION DETECTED.", true);
                }
            } catch (e) {
                showMessage("ARCHIVE FAILED: NO SIGNAL.", true);
            }
        }

        async function viewArchives() {
            hideAllViews();
            document.getElementById("nav-bar").style.display = "block";
            document.getElementById("archives-view").style.display = "flex";

            const container = document.getElementById("blogs-container");
            container.innerHTML = "LOADING ARCHIVES...";

            try {
                const res = await fetch(`${API_URL}/blogs`);
                const blogs = await res.json();
                
                container.innerHTML = "";
                
                if (blogs.length === 0) {
                    container.innerHTML = "<p>NO ARCHIVES FOUND.</p>";
                    return;
                }

                blogs.forEach(blog => {
                    const uniqueId = `typewriter-a-${blog.id}-${Math.random().toString(36).substr(2, 9)}`;
                    const div = document.createElement("div");
                    div.className = "blog-post";
                    div.innerHTML = `
                        <h3>${blog.title}</h3>
                        <p id="${uniqueId}" style="white-space: pre-wrap; font-size: 14px; margin-bottom: 10px;">_</p>
                        <div class="blog-meta">
                            <small style="color:var(--danger-red)">AUTHOR: ${blog.author} | ID: ${blog.author_id}</small>
                            <button class="like-btn" onclick="likeBlog(${blog.id}, false)">[ACK: ${blog.likes}]</button>
                        </div>
                    `;
                    container.appendChild(div);
                    // Trigger typing effect
                    typeWriter(uniqueId, blog.para);
                });

            } catch (e) {
                container.innerHTML = "<p style='color:var(--danger-red)'>SIGNAL LOST. UNABLE TO LOAD ARCHIVES.</p>";
            }
        }

        async function likeBlog(blogId, isHomeView) {
            try {
                const res = await fetch(`${API_URL}/blogs/${blogId}/like`, {
                    method: 'POST',
                    headers: {
                        'Authorization': currentUserId
                    }
                });
                if (res.ok) {
                    if (isHomeView) {
                        showHome();
                    } else {
                        viewArchives();
                    }
                } else {
                    showMessage("COMMUNICATION ERROR.", true);
                }
            } catch (e) {
                showMessage("NETWORK DISCONNECTED.", true);
            }
        }

        // Init
        checkAuth();

    </script>
</body>

</html>
